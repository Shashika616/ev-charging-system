name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # Job 1: Build and Test
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Build with Maven
      run: mvn clean install -DskipTests

    - name: Run tests
      run: mvn test

    # Upload each service's JAR as a SEPARATE artifact (v4 best practice)
    - name: Upload API Gateway artifact
      uses: actions/upload-artifact@v4
      with:
        name: api-gateway-jar
        path: api-gateway/target/*.jar
        retention-days: 1

    - name: Upload Station Service artifact
      uses: actions/upload-artifact@v4
      with:
        name: station-service-jar
        path: station-service/target/*.jar
        retention-days: 1

    - name: Upload Booking Service artifact
      uses: actions/upload-artifact@v4
      with:
        name: booking-service-jar
        path: booking-service/target/*.jar
        retention-days: 1

    - name: Upload Grid Service artifact
      uses: actions/upload-artifact@v4
      with:
        name: grid-service-jar
        path: grid-service/target/*.jar
        retention-days: 1

  # Job 2: Deploy API Gateway
  deploy-api-gateway:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: Download API Gateway artifact
      uses: actions/download-artifact@v4
      with:
        name: api-gateway-jar

    - name: Trigger Render Deploy
      env:
        RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
        RENDER_SERVICE_ID: ${{ secrets.RENDER_API_GATEWAY_SERVICE_ID }}
      run: |
        echo "Triggering deployment for API Gateway..."
        curl -X POST \
          -H "Authorization: Bearer $RENDER_API_KEY" \
          -H "Content-Type: application/json" \
          -d '{"clearCache":true}' \
          "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys"

  # Job 3: Deploy Station Service
  deploy-station-service:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: Download Station Service artifact
      uses: actions/download-artifact@v4
      with:
        name: station-service-jar

    - name: Trigger Render Deploy
      env:
        RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
        RENDER_SERVICE_ID: ${{ secrets.RENDER_STATION_SERVICE_ID }}
      run: |
        echo "Triggering deployment for Station Service..."
        curl -X POST \
          -H "Authorization: Bearer $RENDER_API_KEY" \
          -H "Content-Type: application/json" \
          -d '{"clearCache":true}' \
          "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys"

  # Job 4: Deploy Booking Service
  deploy-booking-service:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: Download Booking Service artifact
      uses: actions/download-artifact@v4
      with:
        name: booking-service-jar

    - name: Trigger Render Deploy
      env:
        RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
        RENDER_SERVICE_ID: ${{ secrets.RENDER_BOOKING_SERVICE_ID }}
      run: |
        echo "Triggering deployment for Booking Service..."
        curl -X POST \
          -H "Authorization: Bearer $RENDER_API_KEY" \
          -H "Content-Type: application/json" \
          -d '{"clearCache":true}' \
          "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys"

  # Job 5: Deploy Grid Service
  deploy-grid-service:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: Download Grid Service artifact
      uses: actions/download-artifact@v4
      with:
        name: grid-service-jar

    - name: Trigger Render Deploy
      env:
        RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
        RENDER_SERVICE_ID: ${{ secrets.RENDER_GRID_SERVICE_ID }}
      run: |
        echo "Triggering deployment for Grid Service..."
        curl -X POST \
          -H "Authorization: Bearer $RENDER_API_KEY" \
          -H "Content-Type: application/json" \
          -d '{"clearCache":true}' \
          "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys"
