server:
  port: ${PORT:8080}

spring:
  application:
    name: station-service

  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  data:
    redis:
      host: ${REDIS_HOST}
      port:  ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD}
      ssl:
        enabled: true

  rabbitmq:
    addresses: ${RABBITMQ_URL}
    listener:
      simple:
        acknowledge-mode: manual
        retry:
          enabled: true
          multiplier: 2.0
          max-attempts: 3
          initial-interval: 10000

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${ASGARDEO_ISSUER_URI}